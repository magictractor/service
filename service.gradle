plugins {
    id 'java-library'
    
    // https://docs.gradle.org/current/userguide/publishing_maven.html
    id 'maven-publish'
}

group = 'uk.co.magictractor'
version = '0.0.1-SNAPSHOT'

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        
            pom {
                name = "${project.name.capitalize()}"
                description = 'Useful code for service implementations.'
                url = "https://github.com/magictractor/${project.name}"
                inceptionYear = '2026'

                licenses {
                    license {
                        name = 'Apache License, Version 2.0'
                        url = 'http://www.apache.org/licenses/LICENSE-2.0'
                    }
                }
                developers {
                    developer {
                        id = 'kend'
                        name = 'Ken Dobson'
                       // email = 'me@gmail.com'
                    }
                }
                scm {
                    // connection = 'scm:git:git:github.com/magictractor/${project.name}.git'
                    // developerConnection = 'scm:git:ssh://github.com/magictractor/${project.name}.git'
                    url = "https://github.com/magictractor/${project.name}"
                }
            }
        }
    }

    repositories {
        //maven {
        //    name = 'myRepo'
        //    url = layout.buildDirectory.dir("repo")
        //}
    }
}

// https://docs.gradle.org/current/userguide/declaring_repositories.html
repositories {
    // mavenLocal() for snapshots of other uk.co.magictractor projects
    // Alternatively, other uk.co.magictractor projects may be included by
    // adding their source directory to sourceSets.main.java.srcDirs.
    // The other projects should include the maven-publish plugin and use the publishToMavenLocal task.
    // See https://docs.gradle.org/current/userguide/publishing_maven.html.
    mavenLocal()

    mavenCentral()
}

test {
    useJUnitPlatform()
}

java {
    sourceSets.main.java.srcDirs += ['../util/src/main/java']

    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
    
    withSourcesJar()
    //withJavadocJar()
}

tasks.withType(Jar) {
    destinationDirectory.set(file("$rootDir/jars"))
}

clean {
    delete "$rootDir/jars"
}

// "libs.xxx" refers to libraries configured in version catalog in settings.gradle.
dependencies {
    // Logger API.
    implementation libs.slf4j.api
    // Logger implementation for unit tests.
    runtimeOnly libs.logback.classic

    // For ExceptionUtil
    //implementation 'uk.co.magictractor:util:0.0.1-SNAPSHOT'
    
    // Usually testImplementation scope but JUnit is used in src/main/java, see the junit package.
    compileOnly libs.junit.jupiter;
    testRuntimeOnly libs.junit.jupiter.platform;
    testImplementation libs.assertj;
    
    // temp while importing source
    implementation libs.guava
}
